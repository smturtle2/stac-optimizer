name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --extra-index-url https://download.pytorch.org/whl/cpu -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  package:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m pip install --extra-index-url https://download.pytorch.org/whl/cpu "torch>=2.10"

      - name: Build distributions
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Smoke test built wheel
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.whl
          python - <<'PY'
          from torch import nn
          from stac_optimizer import STAC

          model = nn.Sequential(
              nn.Linear(4, 4),
              nn.ReLU(),
              nn.Linear(4, 2),
          )
          optimizer = STAC(model, last_n_layers=1)
          assert optimizer.partition.adamw_layer_names == ("2",)
          PY

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build setuptools-scm twine

      - name: Verify tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          from setuptools_scm import get_version

          tag_name = os.environ["TAG_NAME"]
          tag_version = tag_name.removeprefix("v")
          package_version = get_version(root=".", version_scheme="guess-next-dev", local_scheme="no-local-version")

          if tag_version != package_version:
              raise SystemExit(
                  f"Tag version {tag_version!r} does not match package version {package_version!r}."
              )
          PY

      - name: Build distributions
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
