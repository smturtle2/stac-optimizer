  <text x="144" y="326" fill="#D8E1F6" font-family="'IBM Plex Mono', 'Menlo', monospace" font-size="16">layer 0 / sign trunk</text>
  <text x="350" y="287" fill="#F8F4ED" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="28" font-weight="700">block.0</text>
  <text x="340" y="326" fill="#D8E1F6" font-family="'IBM Plex Mono', 'Menlo', monospace" font-size="16">layer 1 / sign trunk</text>
  <text x="546" y="287" fill="#F8F4ED" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="28" font-weight="700">block.2</text>
