  <text x="138" y="135" fill="#F9F6F0" font-family="'IBM Plex Mono', 'Menlo', monospace" font-size="16" font-weight="600" letter-spacing="0.12em">STAC / OPTIMIZER</text>
  <text x="108" y="224" fill="#10244B" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="72" font-weight="700">
    <tspan x="108" dy="0">SignSGD trunk.</tspan>
    <tspan x="108" dy="84">AdamW cap.</tspan>
  </text>
  <text x="112" y="380" fill="#23365D" font-family="'Iowan Old Style', 'Georgia', serif" font-size="29">
    <tspan x="112" dy="0">A PyTorch optimizer that keeps early layers cheap and directional,</tspan>
    <tspan x="112" dy="42">then spends adaptive updates where the representation meets the task.</tspan>
  </text>
  <text x="112" y="486" fill="#4F5F7F" font-family="'IBM Plex Mono', 'Menlo', monospace" font-size="18">
    torch&gt;=2.10   •   python 3.13   •   default last_n_layers=1
  </text>
  <text x="804" y="214" fill="#F9F6F0" font-family="'IBM Plex Mono', 'Menlo', monospace" font-size="18" font-weight="600" letter-spacing="0.12em">TRUNK</text>
  <text x="804" y="252" fill="#F9F6F0" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="38" font-weight="700">sign(momentum)</text>
  <text x="804" y="297" fill="#D8E1F6" font-family="'Iowan Old Style', 'Georgia', serif" font-size="24">Stable sign updates across the earlier layers.</text>
  <text x="808" y="428" fill="#FFF8F2" font-family="'IBM Plex Mono', 'Menlo', monospace" font-size="18" font-weight="600" letter-spacing="0.12em">CAP</text>
  <text x="808" y="466" fill="#FFF8F2" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="38" font-weight="700">AdamW</text>
  <text x="808" y="510" fill="#FFE3D0" font-family="'Iowan Old Style', 'Georgia', serif" font-size="24">Adaptive refinement on the final trainable layers.</text>
